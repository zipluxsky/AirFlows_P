# Airflow uses Docker named volumes; no need to mkdir on the host.
# dags / logs / config / plugins each live in their own volume.

services:
  airflow-webserver:
    image: apache/airflow:2.8.0
    command: webserver
    volumes:
      - airflow-dags:/opt/airflow/dags
      - airflow-logs:/opt/airflow/logs
      - airflow-config:/opt/airflow/config
      - airflow-plugins:/opt/airflow/plugins
    environment:
      - TZ=Asia/Hong_Kong
      - AIRFLOW__CORE__DEFAULT_TIMEZONE=Asia/Hong_Kong
      - AIRFLOW__CORE__EXECUTOR=CeleryExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
      - AIRFLOW__CELERY__RESULT_BACKEND=db+postgresql://airflow:airflow@postgres/airflow
      - AIRFLOW__CELERY__BROKER_URL=redis://redis:6379/0
      - AIRFLOW__CORE__FERNET_KEY=
      - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=true
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - AIRFLOW__API__AUTH_BACKENDS=airflow.api.auth.backend.basic_auth
      - _PIP_ADDITIONAL_REQUIREMENTS=apache-airflow-providers-celery redis sqlalchemy
    depends_on:
      - postgres
      - redis
    ports:
      - "8080:8080"
    networks:
      - airflow_shared_net
    restart: unless-stopped

  airflow-scheduler:
    image: apache/airflow:2.8.0
    command: scheduler
    volumes:
      - airflow-dags:/opt/airflow/dags
      - airflow-logs:/opt/airflow/logs
      - airflow-config:/opt/airflow/config
      - airflow-plugins:/opt/airflow/plugins
    environment:
      - TZ=Asia/Hong_Kong
      - AIRFLOW__CORE__DEFAULT_TIMEZONE=Asia/Hong_Kong
      - AIRFLOW__CORE__EXECUTOR=CeleryExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
      - AIRFLOW__CELERY__RESULT_BACKEND=db+postgresql://airflow:airflow@postgres/airflow
      - AIRFLOW__CELERY__BROKER_URL=redis://redis:6379/0
      # Points to Vascular's Redis so Airflow can dispatch tasks to Vascular workers
      - VASCULAR_CELERY_BROKER_URL=redis://vascular-redis:6379/0
      - AIRFLOW__CORE__FERNET_KEY=
      - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=true
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - _PIP_ADDITIONAL_REQUIREMENTS=apache-airflow-providers-celery redis sqlalchemy
    depends_on:
      - airflow-init
    networks:
      - airflow_shared_net
    restart: unless-stopped

  airflow-worker:
    image: apache/airflow:2.8.0
    command: celery worker
    volumes:
      - airflow-dags:/opt/airflow/dags
      - airflow-logs:/opt/airflow/logs
      - airflow-config:/opt/airflow/config
      - airflow-plugins:/opt/airflow/plugins
    environment:
      - TZ=Asia/Hong_Kong
      - AIRFLOW__CORE__DEFAULT_TIMEZONE=Asia/Hong_Kong
      - AIRFLOW__CORE__EXECUTOR=CeleryExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
      - AIRFLOW__CELERY__RESULT_BACKEND=db+postgresql://airflow:airflow@postgres/airflow
      - AIRFLOW__CELERY__BROKER_URL=redis://redis:6379/0
      # Points to Vascular's Redis so Airflow can dispatch tasks to Vascular workers
      - VASCULAR_CELERY_BROKER_URL=redis://vascular-redis:6379/0
      - AIRFLOW__CORE__FERNET_KEY=
      - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=true
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - _PIP_ADDITIONAL_REQUIREMENTS=apache-airflow-providers-celery redis sqlalchemy
    depends_on:
      - airflow-init
    networks:
      - airflow_shared_net
    restart: unless-stopped

  airflow-init:
    image: apache/airflow:2.8.0
    command: >
      bash -c "
        airflow db init &&
        airflow users create --username admin --firstname Admin --lastname User --role Admin --email admin@example.com --password admin
      "
    volumes:
      - airflow-dags:/opt/airflow/dags
      - airflow-logs:/opt/airflow/logs
      - airflow-config:/opt/airflow/config
      - airflow-plugins:/opt/airflow/plugins
    environment:
      - TZ=Asia/Hong_Kong
      - AIRFLOW__CORE__DEFAULT_TIMEZONE=Asia/Hong_Kong
      - AIRFLOW__CORE__EXECUTOR=CeleryExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
      - AIRFLOW__CORE__FERNET_KEY=
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - _PIP_ADDITIONAL_REQUIREMENTS=apache-airflow-providers-celery redis sqlalchemy
    depends_on:
      - postgres
    networks:
      - airflow_shared_net

  postgres:
    image: postgres:15
    environment:
      TZ: Asia/Hong_Kong
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5
    networks:
      - airflow_shared_net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    environment:
      - TZ=Asia/Hong_Kong
    networks:
      - airflow_shared_net
    restart: unless-stopped

volumes:
  airflow-dags:
  airflow-logs:
  airflow-config:
  airflow-plugins:
  postgres-db:

networks:
  airflow_shared_net:
    name: airflow_shared_net
    driver: bridge

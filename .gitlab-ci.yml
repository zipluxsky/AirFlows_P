# GitLab CI/CD: deploy Airflow using official Docker image (no SSH).
# Shell executor only: jobs run directly in the Runner host's shell; Docker executor / dind is not used.
# Uses Docker named volumes for dags/logs/config/plugins; no need to mkdir on the host.
# Runner host must have Docker installed and be able to run docker compose (sudo docker / docker compose).
# Policy: use sudo for all docker/compose commands; do not use sudo for other commands (cd, test, etc.).

default:
  tags:
    - Docker-FIX
  # Shell executor: no image specified; runs on the runner host

stages:
  - permission_test
  - deploy

variables:
  # Deploy runs from repo directory; docker-compose uses named volumes, no host directory permissions needed
  DEPLOY_PATH: "${CI_PROJECT_DIR}"
  # Fixed project name so the dags volume is predictable for deploy_dags (volume name: airflow_airflow-dags)
  COMPOSE_PROJECT_NAME: "airflow"

permission_test:
  stage: permission_test
  script:
    # Basic Docker and Compose availability
    - sudo docker ps
    - sudo docker compose version
    # Volume permissions: create, mount, write, delete
    - |
      VOL_NAME="ci_perm_test_$$"
      sudo docker volume create "$VOL_NAME"
      sudo docker run --rm -v "${VOL_NAME}:/data" alpine touch /data/ok
      sudo docker run --rm -v "${VOL_NAME}:/data" alpine test -f /data/ok
      sudo docker volume rm "$VOL_NAME"
    # Verify compose can run from current directory (no mkdir needed)
    - cd "${CI_PROJECT_DIR}" && test -f docker-compose.yml && sudo docker compose config --quiet
  only:
    - master

.deploy_base:
  stage: deploy
  before_script:
    - cd "${DEPLOY_PATH}"
    - test -f docker-compose.yml

# Auto-detect: if only dags/ changed → sync DAGs only; otherwise → full deploy (and sync DAGs if they changed too).
deploy:
  extends: .deploy_base
  script:
    - |
      # Detect changed files (push: before vs current; fallback to full deploy if no valid diff)
      PREV="${CI_COMMIT_BEFORE_SHA:-0000000000000000000000000000000000000000}"
      if [ "$PREV" = "0000000000000000000000000000000000000000" ] || ! git rev-parse -q --verify "$PREV" >/dev/null 2>&1; then
        CHANGED_FILES=""
      else
        CHANGED_FILES=$(git diff --name-only "$PREV" "$CI_COMMIT_SHA" 2>/dev/null || true)
      fi
      DAGS_ONLY=1
      HAS_DAGS_CHANGE=0
      for f in $CHANGED_FILES; do
        case "$f" in dags/*) HAS_DAGS_CHANGE=1 ;; *) DAGS_ONLY=0 ;; esac
      done
      [ -z "$CHANGED_FILES" ] && DAGS_ONLY=0
      if [ "$DAGS_ONLY" = 1 ] && [ "$HAS_DAGS_CHANGE" = 1 ]; then
        echo "Only dags/ changed → syncing DAGs only (no restart)."
        sudo docker volume create "${COMPOSE_PROJECT_NAME}_airflow-dags" 2>/dev/null || true
        sudo docker run --rm \
          -v "${COMPOSE_PROJECT_NAME}_airflow-dags:/opt/airflow/dags" \
          -v "${CI_PROJECT_DIR}/dags:/source:ro" \
          alpine sh -c "find /opt/airflow/dags -mindepth 1 -delete && cp -r /source/. /opt/airflow/dags/"
      else
        echo "Full deploy (compose pull + up -d)."
        cd "${DEPLOY_PATH}" && sudo docker compose --project-name "${COMPOSE_PROJECT_NAME}" pull && sudo docker compose --project-name "${COMPOSE_PROJECT_NAME}" up -d
        if [ "$HAS_DAGS_CHANGE" = 1 ]; then
          echo "DAGs also changed → syncing DAGs into volume."
          sudo docker volume create "${COMPOSE_PROJECT_NAME}_airflow-dags" 2>/dev/null || true
          sudo docker run --rm \
            -v "${COMPOSE_PROJECT_NAME}_airflow-dags:/opt/airflow/dags" \
            -v "${CI_PROJECT_DIR}/dags:/source:ro" \
            alpine sh -c "find /opt/airflow/dags -mindepth 1 -delete && cp -r /source/. /opt/airflow/dags/"
        fi
      fi
  only:
    - master
